name: Robin Automation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROPOSAL_ID: "344878"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          # Create credentials file
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service_account.json
          
          # Upgrade pip
          python -m pip install --upgrade pip
          
          # Install requirements (ensure 'playwright' is listed here)
          python -m pip install -r requirements.txt
          
          # Install browser binaries using 'python -m' to bypass PATH issues
          python -m playwright install --with-deps chromium
          
          # Run script using 'python' directly
          python main.py
