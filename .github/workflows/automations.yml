name: Robin Automation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache is removed here to force a fresh, correct install

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly install from your requirements.txt
          python -m pip install -r requirements.txt
          # Ensure playwright browser binaries are ready
          python -m playwright install --with-deps chromium

      - name: Create Google Service Account File
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service_account.json

      - name: Run automation
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROPOSAL_ID: "344878"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          # Use python -m to ensure the runner uses the same environment
          python main.py
