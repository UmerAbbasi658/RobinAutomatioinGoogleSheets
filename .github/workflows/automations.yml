name: Robin Automation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          # Force install Playwright and Google libraries first
          python -m pip install playwright google-api-python-client google-auth-httplib2 google-auth-oauthlib
          # Install everything else from your file
          python -m pip install -r requirements.txt
          # Install the browser binaries
          python -m playwright install --with-deps chromium

      - name: Run Automation
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROPOSAL_ID: "344878"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Create credentials file
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service_account.json
          # Execute the script
          python main.py
