name: Robin Automation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROPOSAL_ID: "344878"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          # 1. Create the credentials file first
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service_account.json
          
          # 2. Upgrade pip and install everything in ONE step
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          
          # 3. Force install playwright binaries
          python -m playwright install --with-deps chromium
          
          # 4. Run the script immediately in the same shell
          python main.py
