name: Robin Automation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROPOSAL_ID: "344878"
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          # 1. Create the credentials file
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service_account.json
          
          # 2. Upgrade pip
          python -m pip install --upgrade pip
          
          # 3. FORCE INSTALL PLAYWRIGHT FIRST (This fixes the "No module named" error)
          python -m pip install playwright
          
          # 4. Install everything else from requirements.txt (Google libs, etc.)
          python -m pip install -r requirements.txt
          
          # 5. Install the browser binaries
          python -m playwright install --with-deps chromium
          
          # 6. Run the script
          python main.py
